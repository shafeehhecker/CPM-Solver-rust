name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"          # e.g. v1.2.0
      - "v[0-9]+.[0-9]+.[0-9]+-*"         # e.g. v1.2.0-beta.1

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  BIN_NAME: cpm_scheduler

jobs:
  # ── Build native binaries for all three platforms ──────────────────────────
  build-release:
    name: Build · ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86-64 – glibc (most desktop distros)
          - name: Linux x86-64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_suffix: linux-x86_64

          # Linux arm64 – Raspberry Pi 4 / cloud arm runners
          - name: Linux arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_suffix: linux-aarch64
            cross: true

          # macOS x86-64 (Intel)
          - name: macOS Intel
            os: macos-latest
            target: x86_64-apple-darwin
            asset_suffix: macos-x86_64

          # macOS arm64 (Apple Silicon)
          - name: macOS Apple Silicon
            os: macos-latest
            target: aarch64-apple-darwin
            asset_suffix: macos-aarch64

          # Windows x86-64 (MSVC)
          - name: Windows x86-64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_suffix: windows-x86_64
            exe_suffix: .exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry / build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-release-

      # ── Platform-specific tooling ──────────────────────────────────────────
      - name: Install Linux x86 dependencies
        if: runner.os == 'Linux' && !matrix.cross
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev

      - name: Install cross (for arm64 Linux)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      # ── Package ───────────────────────────────────────────────────────────
      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          ASSET="${{ env.BIN_NAME }}-${{ github.ref_name }}-${{ matrix.asset_suffix }}.tar.gz"
          cd target/${{ matrix.target }}/release
          tar czf "../../../${ASSET}" "${{ env.BIN_NAME }}"
          echo "ASSET=${ASSET}" >> "$GITHUB_ENV"
          # Compute SHA-256
          sha256sum "../../../${ASSET}" > "../../../${ASSET}.sha256"

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ASSET = "${{ env.BIN_NAME }}-${{ github.ref_name }}-${{ matrix.asset_suffix }}.zip"
          Compress-Archive `
            -Path "target/${{ matrix.target }}/release/${{ env.BIN_NAME }}${{ matrix.exe_suffix }}" `
            -DestinationPath $ASSET
          echo "ASSET=$ASSET" | Out-File -FilePath $env:GITHUB_ENV -Append
          $hash = (Get-FileHash $ASSET -Algorithm SHA256).Hash.ToLower()
          "$hash  $ASSET" | Out-File -FilePath "$ASSET.sha256"

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.asset_suffix }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
          retention-days: 1

  # ── Create GitHub Release and attach binaries ──────────────────────────────
  publish:
    name: Publish GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write     # required to create/update releases

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artefacts
        uses: actions/download-artifact@v4
        with:
          path: artefacts
          merge-multiple: true

      - name: List artefacts
        run: ls -lh artefacts/

      # Derive a human-readable changelog from annotated tag message
      - name: Extract tag message
        id: tag_msg
        run: |
          TAG="${{ github.ref_name }}"
          MSG=$(git tag -l --format='%(contents)' "$TAG" 2>/dev/null || echo "Release $TAG")
          # Escape for GitHub Actions multiline output
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$MSG"      >> "$GITHUB_OUTPUT"
          echo "EOF"       >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CPM Scheduler ${{ github.ref_name }}"
          body: ${{ steps.tag_msg.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artefacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
